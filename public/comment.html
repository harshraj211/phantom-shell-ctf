<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureShop - Community</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <a class="logo" href="index.html">🛒 SecureShop</a>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Search</a></li>
        <li><a href="comment.html">Community</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="flags.html">🚩 Flags</a></li>
    </ul>
</nav>

<div class="container">
    <h2>💬 Community Board</h2>

    <form onsubmit="postComment(event)">
        <label>Your Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Comment</label>
        <textarea id="comment" rows="4" placeholder="Write something..."></textarea>
        <p class="hint">💡 Hint: What happens when user input is rendered directly on the page?</p>

        <button type="submit">Post Comment</button>
    </form>

    <div id="post-result"></div>

    <hr style="margin:30px 0;">
    <h3>Recent Comments</h3>
    <div id="comments-list"><p class="loading">Loading comments...</p></div>
</div>

<footer>SecureShop &copy; 2024 — For educational purposes only</footer>

<script>
    async function loadComments() {
        const list = document.getElementById('comments-list');
        try {
            const res = await fetch('/api/comment');
            const data = await res.json();

            if (!data.comments || data.comments.length === 0) {
                list.innerHTML = '<div class="alert alert-info">No comments yet. Be the first!</div>';
                return;
            }

            list.innerHTML = data.comments.map(c => `
                <div style="border:1px solid #eee; border-radius:8px; padding:15px; margin-bottom:15px;">
                    <strong>${c.name}</strong>
                    <span style="color:#aaa; font-size:12px; margin-left:10px;">${c.created_at}</span>
                    <p style="margin-top:8px;" class="comment-body"></p>
                </div>
            `).join('');

            document.querySelectorAll('.comment-body').forEach((el, i) => {
                el.innerHTML = data.comments[i].comment;
            });
        } catch (err) {
            list.innerHTML = '<div class="alert alert-danger">Failed to load comments.</div>';
        }
    }

    async function postComment(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const comment = document.getElementById('comment').value;
        const result = document.getElementById('post-result');

        try {
            const res = await fetch('/api/comment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, comment })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('name').value = '';
                document.getElementById('comment').value = '';
                result.innerHTML = '<div class="alert alert-success">✅ Comment posted!</div>';
                setTimeout(() => result.innerHTML = '', 2000);
                loadComments();
            } else {
                result.innerHTML = `<div class="alert alert-danger">❌ ${data.error}</div>`;
            }
        } catch (err) {
            result.innerHTML = '<div class="alert alert-danger">❌ Request failed.</div>';
        }
    }

    loadComments();
</script>
</body>
</html>
